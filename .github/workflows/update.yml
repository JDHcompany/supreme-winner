name: Send Telegram Notification

on:
  schedule:
    # Запуск каждые 6 часов (в 00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:   # Ручной запуск из вкладки Actions

permissions:
  contents: read

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run script to process and send
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_TO_ID: ${{ secrets.TELEGRAM_TO_ID }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: python update_configs.py
